<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тёмный особняк</title>
  <style>
    /* Стили CSS */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background-color: #0a0a0a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e0e0e0;
      background-image: linear-gradient(to bottom, #0a0a0a, #1a1a2a, #0a0a1a);
    }
    .container { text-align: center; max-width: 800px; width: 100%; padding: 20px; }
    .title {
      font-size: 3em;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #ff0000, 0 0 20px #8b0000;
      color: #8b0000;
      letter-spacing: 2px;
    }

    /* Блок контента (картинка + текст) */
    .content-grid { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
    .image-card {
      width: 200px;
      height: 250px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(139, 0, 0, 0.5);
      border: 2px solid #8b0000;
    }
    .action-image { width: 100%; height: 100%; object-fit: cover; }
    .text-card {
      flex: 1;
      padding: 20px;
      background: rgba(30, 10, 10, 0.7);
      border-radius: 10px;
      border: 1px solid #8b0000;
      box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
      min-height: 120px;
      display: flex;
      align-items: center;
    }

    /* Кнопки */
    .buttons-row { display: flex; flex-direction: column; gap: 15px; align-items: center; }
    .btn {
      display: inline-block;
      padding: 15px 30px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      background-color: rgba(139, 0, 0, 0.8);
      border-radius: 5px;
      transition: all 0.3s ease;
      width: 300px;
      text-align: center;
      border: 1px solid #ff0000;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
    }
    .btn:hover {
      background-color: rgba(200, 20, 20, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">ТЁМНЫЙ ОСОБНЯК</h1>

    <!-- Блок с картинкой и текстом сюжета -->
    <div class="content-grid">
      <div class="image-card">
        <img id="scene-image" src="horror1.jpg" alt="Сцена" class="action-image">
      </div>
      <div class="text-card">
        <p id="scene-text">Вы просыпаетесь в старом особняке. Часы на стене остановились на 3:17...</p>
      </div>
    </div>

    <!-- Блок с кнопками выбора -->
    <div id="buttons-row" class="buttons-row">
      <!-- Кнопки будут созданы скриптом -->
    </div>
  </div>

  <script>
    // JavaScript: логика хоррор-сюжета
    document.addEventListener('DOMContentLoaded', function() {
      // База данных сюжета (сцены) — 5 действий
      const scenes = [
         {
          id: 0,
          text: "Вы засыпаете снова.....",
          image: "horror1.jpg",
          choices: [
            { text: "Встать", nextScene: 2 },
            
          ]
        },
        {
          id: 1,
          text: "Вы просыпаетесь в старом особняке. Часы на стене остановились на 3:17....",
          image: "horror1.png",
          choices: [
            { text: "Встать", nextScene: 2 },
            { text: "Остаться лежать", nextScene: 0 }
          ]
        },
        {
          id: 2,
          text: "Вы Встали. Дверь со скрипом открывается. За дверью темно и пахнет плесенью. Слышны странные шорохи из глубины дома...",
          image: "horror2.png",
          choices: [
            { text: "Зажечь фонарик и идти вперёд", nextScene: 3 },
            { text: "Попытаться найти выключатель", nextScene: 5 }
          ]
        },
        {
          id: 3,
          text: "Выйдя из комнаты, вы замечаете разбитое окно на втором этаже. Из него доносится странный шёпот...",
          image: "horror3.png",
          choices: [
            { text: "Идти дальше ", nextScene: 4 },
            { text: " Все таки  обратно лечь спать", nextScene: 0 }
          ]
        },
        {
          id: 4,
          text: "Луч фонарика выхватывает из темноты портрет женщины на стене. Её глаза как будто следят за вами...",
          image: "horror4.png",
          choices: [
            { text: "Присмотреться к портрету", nextScene: 5 },
            { text: "Быстро пройти мимо", nextScene: 9 }
          ]
        },
        {
          id: 5,
          text: "Вы пресмотрелись  к портрету. Но резко открылась окно в соседней комнате...",
          image: "horror5.png",
          choices: [
            { text: "Пойти и закрыть  окно ", nextScene: 7 },
            { text: "Не идти попробовать найти выключатель света", nextScene: 6 }
          ]
        },
        {
          id: 7,
          text: "Вы подходите к окну. И закрываете его  ...",
          image: "horror7.png",
          choices: [
            { text: "Остаться у окна и смотреть в него ", nextScene: 10 },
            
          ]
        },
        {
          id: 12,
          text: "Вы подняли куклу и (продолжение следует)...",
          image: "horror10.png",
          choices: [
            { text: "В начало сюжета ", nextScene: 1 },
            
          ]
        },
        {
          id: 10,
          text: "Вы смотрите в окно. Вдург вас кто сильно толкнул. Вы упали на пол. Потеряли сознание. Последнее что вы успели увидеть силует в окне  ...",
          image: "horror8.png",
          choices: [
            { text: "Вернуться назад ", nextScene: 5 },
            
          ]
        },
        {
          id: 6,
          text: "Вы нащупали выключатель. Свет мигает несколько раз и загорается. В коридоре стоит кукла ...",
          image: "horror9.png",
          choices: [
            { text: "Поднять куклу", nextScene: 12 },
            { text: "Побежать наверх по лестнице", nextScene: 11 }
          ]
        }
      ];

      // Функция для показа сцены
      function showScene(sceneId) {
        const scene = scenes.find(s => s.id === sceneId);
        if (!scene) return;

        document.getElementById('scene-text').textContent = scene.text;
        document.getElementById('scene-image').src = scene.image;

        // Очищаем старые кнопки и создаём новые
        const buttonsRow = document.getElementById('buttons-row');
        buttonsRow.innerHTML = '';

        scene.choices.forEach(choice => {
          const button = document.createElement('a');
          button.className = 'btn';
          button.href = '#';
          button.textContent = choice.text;
          button.addEventListener('click', () => showScene(choice.nextScene));
          buttonsRow.appendChild(button);
        });
      }

      // Старт сюжета (показываем первую сцену)
      showScene(1);
    });
  </script>
</body>
</html>
